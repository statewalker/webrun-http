<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>webrun-http-browser — local file server demo (relay)</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 60rem; }
      .panel { display: flex; gap: 1rem; min-height: 22rem; }
      .files { width: 16rem; border: 1px solid #e5e5e5; padding: 0.5rem; overflow: auto; }
      .preview { flex: 1; border: 1px solid #e5e5e5; }
      iframe { width: 100%; height: 100%; border: none; }
      .tree-node { padding-left: 1rem; }
      .entry { display: flex; gap: 0.25rem; cursor: pointer; font-family: monospace; }
    </style>
  </head>
  <body>
    <h1>Local disk → in-browser file server</h1>
    <p>
      Click <strong>Open folder</strong> and pick a directory. A relay
      ServiceWorker will serve the folder's contents from an in-browser URL
      rooted at <code>~FS/</code>.
    </p>
    <button type="button" id="open">Open folder</button>
    <button type="button" id="reload" style="display: none;">Reload tree</button>
    <div class="panel">
      <div class="files" id="files"></div>
      <div class="preview">
        <iframe title="File preview" id="preview" name="preview" src=""></iframe>
      </div>
    </div>

    <script type="module">
      import * as WebRunHttp from "../dist/index.js";

      const openBtn = document.querySelector("#open");
      const reloadBtn = document.querySelector("#reload");
      const filesView = document.querySelector("#files");

      openBtn.addEventListener("click", async () => {
        const rootHandle = await window.showDirectoryPicker();
        const permission = await rootHandle.requestPermission?.({ mode: "read" });
        if (permission && permission !== "granted") {
          throw new Error("Permission denied");
        }

        const SERVICE_KEY = "FS";
        const connection = await WebRunHttp.newRemoteRelayChannel();
        const serviceBaseUrl = `${connection.baseUrl}~${SERVICE_KEY}`;

        await WebRunHttp.initHttpService(
          async (request) => {
            const url = new URL(request.url);
            const rel = url.pathname.substring(
              new URL(serviceBaseUrl).pathname.length,
            );
            const path = rel.replace(/^\/+/, "").replace(/\/$/, "");
            try {
              const file = await resolveFile(rootHandle, path);
              if (!file) return new Response(null, { status: 404 });
              const body = await file.stream();
              return new Response(body, {
                headers: { "Content-Type": file.type || guessMime(file.name) },
              });
            } catch (_err) {
              return new Response(null, { status: 404 });
            }
          },
          { key: SERVICE_KEY, port: connection.port },
        );

        openBtn.style.display = "none";
        reloadBtn.style.display = "";
        reloadBtn.addEventListener("click", () => renderTree(rootHandle, serviceBaseUrl));
        renderTree(rootHandle, serviceBaseUrl);
      });

      async function resolveFile(root, path) {
        const parts = path.split("/").filter(Boolean);
        let dir = root;
        for (let i = 0; i < parts.length - 1; i++) {
          dir = await dir.getDirectoryHandle(parts[i]);
        }
        const handle = await dir.getFileHandle(parts[parts.length - 1]);
        return handle.getFile();
      }

      async function renderTree(rootHandle, baseUrl) {
        filesView.innerHTML = "";
        await renderDir(rootHandle, "", baseUrl, filesView);
      }

      async function renderDir(handle, prefix, baseUrl, parent) {
        for await (const [name, entry] of handle.entries()) {
          const node = document.createElement("div");
          node.className = "tree-node";
          const row = document.createElement("div");
          row.className = "entry";
          const path = `${prefix}${name}`;
          if (entry.kind === "directory") {
            row.textContent = `📁 ${name}`;
            let expanded = false;
            row.addEventListener("click", async () => {
              expanded = !expanded;
              if (expanded) await renderDir(entry, `${path}/`, baseUrl, node);
              else for (const c of [...node.children].slice(1)) node.removeChild(c);
            });
          } else {
            const link = document.createElement("a");
            link.href = `${baseUrl}/${path}`;
            link.target = "preview";
            link.textContent = `📄 ${name}`;
            row.appendChild(link);
          }
          node.appendChild(row);
          parent.appendChild(node);
        }
      }

      function guessMime(name) {
        const ext = name.toLowerCase().split(".").pop();
        return ({
          html: "text/html",
          css: "text/css",
          js: "text/javascript",
          json: "application/json",
          png: "image/png",
          jpg: "image/jpeg",
          jpeg: "image/jpeg",
          svg: "image/svg+xml",
          txt: "text/plain",
          md: "text/markdown",
        }[ext] ?? "application/octet-stream");
      }
    </script>
  </body>
</html>
