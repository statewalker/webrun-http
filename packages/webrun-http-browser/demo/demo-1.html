<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>webrun-http-browser — dynamic site demo (relay)</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 60rem; }
      iframe { width: 100%; height: 22rem; border: 1px solid #e5e5e5; }
      code { background: #f4f4f5; padding: 0 0.25rem; border-radius: 0.2rem; }
    </style>
  </head>
  <body>
    <h1>Dynamic in-browser site (relay mode)</h1>
    <p>
      Registers a tiny site under the service key <code>MY_SITE</code> on the
      relay ServiceWorker, then embeds <code>~MY_SITE/index.html</code> in an
      iframe. The “server” is a request router running entirely in this tab.
    </p>
    <div id="view"></div>

    <script type="module">
      import { Hono } from "https://esm.sh/hono@4.9.10";
      import * as WebRunHttp from "../dist/index.js";

      const main = async () => {
        const SERVICE_KEY = "MY_SITE";
        const connection = await WebRunHttp.newRemoteRelayChannel();
        const serviceBaseUrl = `${connection.baseUrl}~${SERVICE_KEY}`;

        const router = getRouter();
        const app = new Hono({ getPath: (req) => req.url.substring(serviceBaseUrl.length) });
        app.route("/", router);

        await WebRunHttp.initHttpService((req) => app.fetch(req), {
          key: SERVICE_KEY,
          port: connection.port,
        });

        const siteUrl = `${serviceBaseUrl}/`;
        const view = document.querySelector("#view");
        const link = document.createElement("a");
        link.href = siteUrl;
        link.target = "_blank";
        link.textContent = `Open ${siteUrl} in a new tab`;
        view.appendChild(link);

        const iframe = document.createElement("iframe");
        iframe.src = siteUrl;
        view.appendChild(iframe);
      };

      function getRouter() {
        const router = new Hono();
        router.get("/api/:name", (c) => {
          const { name } = c.req.param();
          const date = new Date();
          return c.json({
            message: `Hello ${name}!`,
            time: date.toLocaleTimeString(),
            milliseconds: date.getMilliseconds(),
          });
        });
        const files = getStaticFiles();
        router.get("/*", (c) => {
          let path = c.req.path.replace(/#.*$/, "");
          if (path.endsWith("/")) path += "index.html";
          const body = files[path];
          if (!body) return c.notFound();
          const contentType = path.endsWith(".html")
            ? "text/html"
            : path.endsWith(".js")
              ? "text/javascript"
              : path.endsWith(".css")
                ? "text/css"
                : "text/plain";
          c.header("Content-Type", contentType);
          return c.body(body);
        });
        return router;
      }

      function getStaticFiles() {
        return {
          "/index.css": `
            body { font-family: system-ui, sans-serif; margin: 1rem; }
            h2 { color: navy; }`,
          "/index.js": `
            document.addEventListener("DOMContentLoaded", () => {
              const input = document.querySelector("#name");
              const view = document.querySelector("#messages");
              const update = async () => {
                const res = await fetch("./api/" + encodeURIComponent(input.value));
                const { message, time, milliseconds } = await res.json();
                view.innerHTML = "<div>" + message + "</div>" +
                  "<div>Current time: " + time + " (" + milliseconds + "ms)</div>";
              };
              input.addEventListener("input", update);
              update();
            });`,
          "/index.html": '<!DOCTYPE html><html><head><meta charset="utf-8">' +
            '<link rel="stylesheet" href="./index.css">' +
            '</head><body><h2>In-browser dynamic site</h2>' +
            '<label>Name: <input id="name" value="World"></label>' +
            '<div id="messages"></div>' +
            // Split the closing tag so the outer HTML parser doesn't end the script tag early.
            `<script type="module" src="./index.js"></scr${"ipt>"}</body></html>`,
        };
      }

      main().catch(console.error);
    </script>
  </body>
</html>
