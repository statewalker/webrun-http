<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>webrun-http-browser — same-origin demo</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 48rem; }
      h1 { margin-top: 0; }
      pre { background: #f4f4f5; padding: 0.5rem 1rem; border-radius: 0.25rem; overflow: auto; }
      .log { border: 1px solid #e5e5e5; padding: 0.5rem 1rem; min-height: 4rem; }
      .log p { margin: 0.25rem 0; font-family: monospace; }
    </style>
  </head>
  <body>
    <h1>Same-origin ServiceWorker HTTP demo</h1>
    <p>
      This page registers a ServiceWorker at <code>./sw-worker.js</code> and
      mounts a tiny in-browser HTTP handler under <code>./api/</code>. The SW
      then intercepts same-origin <code>fetch()</code> calls matching that
      prefix and routes them to the handler — no remote server involved.
    </p>
    <div class="log" id="log"></div>

    <script type="module">
      import { createLocalAdapter } from "./index.js";

      const log = (msg) => {
        const p = document.createElement("p");
        p.textContent = msg;
        document.querySelector("#log").appendChild(p);
      };

      // The adapter key is also the first URL segment the SW routes to this page;
      // registered handler prefixes must live under `<key>/…`.
      const KEY = "demo";
      const adapter = createLocalAdapter({ key: KEY });
      try {
        await adapter.start();
        log("ServiceWorker activated.");

        const { baseUrl } = await adapter.register(`${KEY}/api/`, async (request) => {
          const url = new URL(request.url);
          return new Response(
            JSON.stringify({
              message: "Hello from the in-browser HTTP handler!",
              at: url.pathname,
              time: new Date().toISOString(),
            }),
            { headers: { "Content-Type": "application/json" } },
          );
        });
        log(`Handler registered at ${baseUrl}`);

        const res = await fetch(`${baseUrl}anything`);
        const body = await res.json();
        log(`GET ${baseUrl}anything → ${JSON.stringify(body)}`);
      } catch (error) {
        log(`Error: ${error.message}`);
        console.error(error);
      }
    </script>
  </body>
</html>
